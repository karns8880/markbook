<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="MarkBook 是一个本地加密的网页端账号密码记录工具。"
    />
    <title>MarkBook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app">
      <section id="lockView" class="lock-view">
        <div class="brand-panel">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M15 20v-4a9 9 0 0 1 18 0v4" />
              <rect x="10" y="20" width="28" height="20" rx="7" />
              <path d="M24 29v5" />
            </svg>
          </div>
          <p class="eyebrow">Local encrypted vault</p>
          <h1>MarkBook</h1>
          <p class="hero-copy">账号、密码、备注和链接都只保存在当前浏览器。</p>
          <div class="signal-row" aria-label="应用状态">
            <span>Web Crypto</span>
            <span>LocalStorage</span>
            <span>Vercel Ready</span>
          </div>
        </div>

          <form id="unlockForm" class="auth-panel" data-mode="login">
          <div>
            <p class="eyebrow" id="modeEyebrow">同步保险库</p>
            <h2 id="authTitle">登录账号</h2>
          </div>

          <div class="mode-switch" aria-label="认证方式">
            <button class="active" type="button" data-auth-mode="login">登录</button>
            <button type="button" data-auth-mode="register">注册</button>
          </div>

          <label class="field">
            <span>邮箱</span>
            <input
              id="emailInput"
              type="email"
              autocomplete="email"
              required
              placeholder="you@example.com"
            />
          </label>

          <label class="field">
            <span>密码</span>
            <input
              id="masterPassword"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
              placeholder="至少 8 位"
            />
          </label>

          <label class="field" id="confirmWrap">
            <span>确认密码</span>
            <input
              id="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              placeholder="再次输入"
            />
          </label>

          <button class="primary-btn" type="submit" id="unlockButton">登录并解锁</button>
          <p class="form-message" id="authMessage" role="status"></p>
        </form>
      </section>

      <section id="vaultView" class="vault-view" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">MarkBook</p>
            <h1>密码记录</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-btn" type="button" id="exportBtn">导出</button>
            <label class="ghost-btn import-label">
              导入
              <input id="importInput" type="file" accept="application/json" />
            </label>
            <button class="danger-btn" type="button" id="lockBtn">退出</button>
          </div>
        </header>

        <main class="workspace">
          <aside class="sidebar">
            <div class="metric">
              <span>记录</span>
              <strong id="totalCount">0</strong>
            </div>
            <div class="metric">
              <span>标签</span>
              <strong id="tagCount">0</strong>
            </div>
            <div class="search-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <path d="m16 16 4 4" />
              </svg>
              <input id="searchInput" type="search" placeholder="搜索标题、账号、标签" />
            </div>
            <div class="tag-list" id="tagList" aria-label="标签筛选"></div>
          </aside>

          <section class="records-panel">
            <div class="section-head">
              <div>
                <p class="eyebrow">Vault</p>
                <h2>账号列表</h2>
              </div>
              <button class="primary-btn compact" type="button" id="newRecordBtn">新增记录</button>
            </div>
            <div id="emptyState" class="empty-state">
              <div class="empty-icon" aria-hidden="true">
                <svg viewBox="0 0 48 48">
                  <path d="M14 12h20a4 4 0 0 1 4 4v22l-14-6-14 6V16a4 4 0 0 1 4-4Z" />
                  <path d="M18 20h12M18 26h8" />
                </svg>
              </div>
              <h3>还没有记录</h3>
              <p>新增第一条账号密码后会显示在这里。</p>
            </div>
            <div class="record-grid" id="recordGrid"></div>
          </section>
        </main>
      </section>
    </div>

    <dialog id="recordDialog">
      <form id="recordForm" method="dialog" class="dialog-card">
        <div class="dialog-head">
          <div>
            <p class="eyebrow" id="dialogMode">New record</p>
            <h2 id="dialogTitle">新增记录</h2>
          </div>
          <button class="icon-btn" type="button" id="closeDialogBtn" aria-label="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <input id="recordId" type="hidden" />
        <div class="form-grid">
          <label class="field">
            <span>标题</span>
            <input id="titleInput" required placeholder="例如 Github" />
          </label>
          <label class="field">
            <span>标签</span>
            <input id="tagInput" placeholder="工作 / 个人 / 服务器" />
          </label>
          <label class="field">
            <span>账号</span>
            <input id="usernameInput" autocomplete="off" placeholder="邮箱或用户名" />
          </label>
          <label class="field">
            <span>链接</span>
            <input id="urlInput" type="url" placeholder="https://example.com" />
          </label>
          <label class="field wide">
            <span>密码</span>
            <div class="password-row">
              <input id="passwordInput" type="text" autocomplete="off" required />
              <button class="ghost-btn" type="button" id="generateBtn">生成</button>
            </div>
          </label>
          <label class="field wide">
            <span>备注</span>
            <textarea id="noteInput" rows="3" placeholder="安全问题、恢复码位置或其他备注"></textarea>
          </label>
        </div>

        <div class="dialog-actions">
          <button class="danger-btn muted" type="button" id="deleteRecordBtn">删除</button>
          <div>
            <button class="ghost-btn" type="button" id="cancelBtn">取消</button>
            <button class="primary-btn" type="submit">保存</button>
          </div>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
